<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <title>Password Generator</title>
</head>
<body>

  <main class="page-container">

   <section class="card password-panel">

      <div class="section-header">
        <div>
          <p class="section-tag">Seguridad</p>
          <h2>Generador de contraseñas</h2>
        </div>

        <img src="./assets/img/candado.png" alt="Password">
      </div>

      <div id="generadorpassword" class="password-box">

        <label for="tamaño">
          Número de caracteres
        </label>

        <input type="number" id="longitud" min="12" max="50" value="12">

        <button type="button" onclick="generarPassword()">
          Generar contraseña
        </button>

        <div id="password" class="password-result"></div>

      </div>

    </section>

  </main>

  </a>
  <a href="./tiempo.html">
    <img src="./assets/img/nube.png" alt="Tiempo">
  </a>
</footer>

  <script src="./js/password.js"></script>

</body>
</html>
